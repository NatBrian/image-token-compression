<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="proxy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#4338ca"/>
    </linearGradient>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/>
    </marker>
    <pattern id="hatch" width="8" height="8" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <rect width="8" height="8" fill="#fee2e2"/>
      <line x1="0" y1="0" x2="0" y2="8" stroke="#fca5a5" stroke-width="3"/>
    </pattern>
    <style>
      .ttl{fill:#4338ca;font-size:42px;font-weight:800;}
      .tag{fill:#475569;font-size:21px;}
      .lbl{fill:#64748b;font-size:14px;}
      .lblb{fill:#334155;font-size:14px;font-weight:700;}
      .pillt{font-size:15px;font-weight:700;}
      .white{fill:#ffffff;}
      .foot{fill:#64748b;font-size:15px;}
      .footb{fill:#4338ca;font-size:15px;font-weight:700;}

      @keyframes shimmer{0%,100%{opacity:.35}50%{opacity:1}}
      .line{animation:shimmer 3s ease-in-out infinite;}
      .line:nth-child(1){animation-delay:0s}.line:nth-child(2){animation-delay:.2s}
      .line:nth-child(3){animation-delay:.4s}.line:nth-child(4){animation-delay:.6s}
      .line:nth-child(5){animation-delay:.8s}.line:nth-child(6){animation-delay:1s}
      .line:nth-child(7){animation-delay:1.2s}.line:nth-child(8){animation-delay:1.4s}

      @keyframes sweep{0%{transform:translateY(0)}100%{transform:translateY(150px)}}
      .scan{animation:sweep 2.6s ease-in-out infinite alternate;}

      @keyframes flow{to{stroke-dashoffset:-28}}
      .flow{stroke-dasharray:9 7;animation:flow 1s linear infinite;}

      @keyframes pulse{0%,100%{transform:scale(1);opacity:.9}50%{transform:scale(1.14);opacity:.4}}
      .lens{transform-box:fill-box;transform-origin:center;animation:pulse 2.4s ease-in-out infinite;}

      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
      .tile{transform-box:fill-box;transform-origin:center;animation:float 3.4s ease-in-out infinite;}

      @keyframes collapse{0%{width:470px}55%{width:287px}100%{width:287px}}
      .gfill{animation:collapse 5s cubic-bezier(.5,0,.2,1) infinite;}

      @keyframes spark{0%,70%,100%{transform:scale(1)}80%{transform:scale(1.25)}}
      .chk{transform-box:fill-box;transform-origin:center;animation:spark 5s ease-in-out infinite;}
    </style>
  </defs>

  <rect width="1200" height="630" rx="24" fill="url(#bg)"/>

  <!-- header -->
  <text x="60" y="80" class="ttl">imgctx</text>
  <text x="300" y="80" class="tag" font-weight="700" fill="#0f172a">render text as images, cut the tokens your coding agent pays for</text>
  <text x="60" y="116" class="tag">A drop-in proxy that shrinks the request. Same answers, far fewer input tokens.</text>

  <!-- ===================== BEFORE ===================== -->
  <g>
    <rect x="70" y="205" width="215" height="215" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="70" y="205" width="215" height="34" rx="12" fill="#f1f5f9"/>
    <rect x="70" y="223" width="215" height="16" fill="#f1f5f9"/>
    <circle cx="88" cy="222" r="4" fill="#cbd5e1"/><circle cx="102" cy="222" r="4" fill="#cbd5e1"/><circle cx="116" cy="222" r="4" fill="#cbd5e1"/>
    <text x="135" y="227" class="lbl">agent context</text>
    <g>
      <rect class="line" x="90" y="258" width="175" height="9" rx="4" fill="#cbd5e1"/>
      <rect class="line" x="90" y="280" width="150" height="9" rx="4" fill="#cbd5e1"/>
      <rect class="line" x="90" y="302" width="178" height="9" rx="4" fill="#cbd5e1"/>
      <rect class="line" x="90" y="324" width="120" height="9" rx="4" fill="#cbd5e1"/>
      <rect class="line" x="90" y="346" width="165" height="9" rx="4" fill="#cbd5e1"/>
      <rect class="line" x="90" y="368" width="140" height="9" rx="4" fill="#cbd5e1"/>
      <rect class="line" x="90" y="390" width="172" height="9" rx="4" fill="#cbd5e1"/>
    </g>
    <rect class="scan" x="76" y="252" width="203" height="7" rx="3" fill="#6366f1" opacity="0.45"/>
    <!-- token badge -->
    <rect x="70" y="168" width="150" height="30" rx="15" fill="#fee2e2"/>
    <text x="145" y="188" text-anchor="middle" class="pillt" fill="#dc2626">46,454 tokens</text>
    <text x="177" y="443" text-anchor="middle" class="lbl">system prompt · tools · files · history</text>
  </g>

  <!-- arrow 1 -->
  <text x="360" y="300" text-anchor="middle" class="lbl">render</text>
  <line class="flow" x1="298" y1="325" x2="432" y2="325" stroke="#94a3b8" stroke-width="3" marker-end="url(#ah)"/>

  <!-- ===================== PROXY ===================== -->
  <g>
    <rect x="442" y="262" width="180" height="126" rx="18" fill="url(#proxy)"/>
    <circle class="lens" cx="532" cy="300" r="17" fill="none" stroke="#c7d2fe" stroke-width="3"/>
    <circle cx="532" cy="300" r="7" fill="#c7d2fe"/>
    <text x="532" y="345" text-anchor="middle" class="white" font-size="19" font-weight="800">imgctx</text>
    <text x="532" y="366" text-anchor="middle" fill="#c7d2fe" font-size="12.5">text  →  image</text>
  </g>

  <!-- arrow 2 -->
  <text x="700" y="300" text-anchor="middle" class="lbl">compress</text>
  <line class="flow" x1="630" y1="325" x2="766" y2="325" stroke="#94a3b8" stroke-width="3" marker-end="url(#ah)"/>

  <!-- ===================== AFTER ===================== -->
  <g>
    <g class="tile">
      <rect x="786" y="228" width="180" height="164" rx="12" fill="#ffffff" stroke="#16a34a" stroke-width="2.5"/>
      <rect x="800" y="242" width="152" height="120" rx="6" fill="#f0fdf4"/>
      <circle cx="828" cy="272" r="12" fill="#fde68a"/>
      <path d="M804 356 L846 306 L878 340 L904 312 L948 356 Z" fill="#86efac"/>
      <rect x="808" y="372" width="118" height="6" rx="3" fill="#bbf7d0"/>
      <rect x="808" y="382" width="90" height="6" rx="3" fill="#bbf7d0"/>
    </g>
    <rect x="786" y="192" width="150" height="30" rx="15" fill="#dcfce7"/>
    <text x="861" y="212" text-anchor="middle" class="pillt" fill="#16a34a">28,464 tokens</text>
    <!-- same answer check -->
    <g class="chk">
      <circle cx="812" cy="420" r="13" fill="#16a34a"/>
      <path d="M805 420 l5 5 l9 -11" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="832" y="425" class="lblb" fill="#166534">same answer</text>
  </g>

  <!-- ===================== TOKEN METER ===================== -->
  <text x="60" y="512" class="lblb">input tokens per request</text>
  <g>
    <rect x="345" y="498" width="470" height="20" rx="10" fill="url(#hatch)"/>
    <rect class="gfill" x="345" y="498" width="287" height="20" rx="10" fill="#16a34a"/>
    <text x="632" y="490" text-anchor="middle" class="lblb" fill="#166534">28,464</text>
    <text x="820" y="513" class="lblb" fill="#dc2626">−39%</text>
    <text x="880" y="513" class="lbl">fewer tokens, and often fewer dollars</text>
  </g>

  <!-- footer strip -->
  <line x1="60" y1="556" x2="1140" y2="556" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="60" y="588" class="foot"><tspan class="footb">Drop-in proxy, no code change.</tspan>  Works with OpenCode, Codex, and Claude Code.  Fail-open, so it can never break a run.</text>
</svg>
